<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 录音播放器</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        audio {
            width: 100%;
            margin: 20px 0;
        }
        .info {
            margin-top: 16px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎧 group A 2087 practice 1</h1>
    <audio controls preload="metadata">
        <source src="practiceaudio.mp3" type="audio/mpeg">
        您的浏览器不支持 audio 元素。
    </audio>
    <div class="info">正在播放：demo.mp3</div>
</div>
</body>
</html>
